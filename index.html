<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Minesweeper</title>
        <link rel="stylesheet" href="minesweeper.css">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Micro+5&display=swap" rel="stylesheet">

        <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

        <script src="minesweeper.js"></script>
    </head>
    <body>
        <div id="page-wrapper">
            <div id="game-wrapper">
                <canvas id="board"></canvas>
                <div id="pop-up" class="hidden">
                    <h1 id="pop-up-title">You Lost!</h1>
                    <button id="pop-up-btn">Play Again</button>
                </div>
                <canvas id="confetti-canvas"></canvas>
            </div>
            <div id="sidebar">
                <h2 id="sidebar-title">Settings</h2>

                <div class="setting-group">
                    <label for="input-rows">Rows</label>
                    <input type="number" id="input-rows" min="5" max="30" value="10"/>
                </div>

                <div class="setting-group">
                    <label for="input-cols">Columns</label>
                    <input type="number" id="input-cols" min="5" max="30" value="10"/>
                </div>

                <div class="setting-group">
                    <label for="input-mines">
                        Mines: <span id="mines-value">20</span>
                    </label>
                    <input type="range" id="input-mines" min="1" max="80" value="20"/>
                </div>

                <button id="generate-btn">Generate</button>
            </div>
        </div>
    </body>
</html>
